<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pathfinder AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; }
        .gradient-text {
            background: linear-gradient(90deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-gray-200 font-sans min-h-screen flex items-center justify-center px-4 py-12">
    <section class="w-full max-w-md">
        <div class="bg-[#111827] border border-gray-800 rounded-2xl p-8 shadow-2xl text-center">
            <h1 class="text-3xl font-extrabold uppercase tracking-tight mb-2">
                <span class="gradient-text">Pathfinder AI</span>
            </h1>
            <p class="text-gray-400 text-sm mb-6">Sign in to start your AI career roadmap</p>

            <div class="w-24 h-24 bg-indigo-950/40 border border-indigo-500/20 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-inner">
                <i class="fa-solid fa-map-location-dot text-4xl text-indigo-400"></i>
            </div>

            <form id="login-form" class="space-y-5 text-left">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Email Address</label>
                    <input type="email" required placeholder="name@company.com" class="w-full bg-[#0f172a] border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Password</label>
                    <input type="password" required placeholder="••••••••" class="w-full bg-[#0f172a] border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-6 rounded-xl transition shadow-lg shadow-indigo-600/20 mt-2">
                    Sign In
                </button>
            </form>
        </div>
    </section>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
